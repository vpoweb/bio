<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio by vpoweb</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center; max-width: 350px; width: 90%; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: #eee; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 5px solid #f0f2f5; }
        h1 { margin: 10px 0; font-size: 24px; color: #2d3436; }
        p { color: #636e72; font-size: 16px; line-height: 1.6; margin-bottom: 25px; }
        .links { display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; padding: 12px; background: #0088cc; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; transition: transform 0.2s, background 0.2s; }
        .btn:hover { background: #0077b5; transform: translateY(-2px); }
        .btn.tg { background: #24A1DE; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🚀</div>
        <h1>Привет! Я vpoweb</h1>
        <p>Начинающий разработчик. Сейчас я учусь создавать сайты и мечтаю собрать свой мод для Telegram.</p>
        <div class="links">
            <a href="https://t.me" class="btn tg">Мой Telegram</a>
        </div>
    </div>
</body>
</html>
